name: Merge validated Dependabot updates

on:
  workflow_run:
    workflows: ["Validate Dependabot updates"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.repository.full_name == 'felixtensor/felixtensor' &&
      github.repository == 'felixtensor/felixtensor'
    runs-on: ubuntu-latest

    steps:
      - name: Squash-merge validated Dependabot update
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          test -n "$PR_NUMBER"

          author="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.user.login')"
          head_ref="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.ref')"
          test "$author" = "dependabot[bot]"
          [[ "$head_ref" == dependabot/* ]]

          gh pr merge --repo "$GITHUB_REPOSITORY" --squash "$PR_NUMBER"
