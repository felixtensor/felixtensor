name: Update GitHub stats

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: update-profile-stats
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: stats
          options: username=felixtensor&count_private=true&show_icons=true&theme=transparent
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Commit updated card
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- profile/stats.svg)" ]]; then
            echo "Stats card is unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- profile/stats.svg
          git commit -m "chore: update GitHub stats"
          git push
